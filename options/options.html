<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VoxTab Settings</title>
  <style>
    body {
      max-width: 600px;
      margin: 40px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
      padding: 0 20px;
    }
    h1 { font-weight: 600; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
    .card { background: #f9fafb; border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
    .form-group.row { flex-direction: row; justify-content: space-between; align-items: center; }
    label { font-weight: 500; margin-bottom: 6px; }
    input[type="range"] { width: 100%; max-width: 300px; }
    .note { font-size: 12px; color: #6b7280; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>VoxTab Advanced Settings</h1>
  
  <div class="card">
    <div class="form-group row">
      <div>
        <label>Pitch Modification</label>
        <div class="note">Adjust the tonal pitch of the voice engine.</div>
      </div>
      <input type="range" id="speechPitch" min="0" max="2" step="0.1" value="1">
    </div>
    
    <div class="form-group row" style="margin-top: 20px;">
      <div>
        <label>Visual Text Highlighting</label>
        <div class="note">Highlight the paragraph currently being read.</div>
      </div>
      <input type="checkbox" id="highlightText">
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
